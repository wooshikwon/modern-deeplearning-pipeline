# MDP Recipe -- 실험 정의서
name: resnet50-cifar10
task: image_classification

model:
  class_path: torchvision.models.resnet50
  pretrained: "hf://microsoft/resnet-50"
  init_args:
    num_classes: 10

data:
  dataset:
    _component_: ImageFolder
    root: ./data/cifar10
    split: train
  dataloader:
    batch_size: 32
    num_workers: 4

training:
  epochs: 10
  precision: fp16
  gradient_accumulation_steps: 1

optimizer:
  _component_: torch.optim.AdamW
  lr: 3.0e-4
  weight_decay: 0.01

evaluation:
  metrics:
    - accuracy
    - f1

callbacks:
  - _component_: ModelCheckpoint
    save_top_k: 3
    monitor: val_loss

metadata:
  author: your-name
  description: "ResNet50 CIFAR-10 분류 예제"
