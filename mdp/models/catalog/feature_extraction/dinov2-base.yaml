# DINOv2 ViT-B/14 — 자기지도학습 기반 범용 비전 백본
name: dinov2-base
family: dinov2
class_path: transformers.AutoModel
head_builtin: false

pretrained_sources:
  - "hf://facebook/dinov2-base"

supported_tasks:
  - feature_extraction
  - image_classification

default_head:
  # 자기지도학습 백본이므로 다운스트림 태스크에 헤드 부착 필요
  task: image_classification
  _target_attr: head
  _component_: ClassificationHead
  hidden_dim: 768
  dropout: 0.1
  pooling: cls

input_spec:
  channels: 3
  height: 224
  width: 224
  dtype: float32

init_args_schema:
  pretrained:
    type: bool
    default: true

adapter_defaults:
  lora:
    # HF Dinov2SelfAttention uses BERT-style separate linears (query/key/value)
    target_modules: ["query", "value"]
    r: 16
    alpha: 32

memory:
  params_m: 86.6
  fp32_gb: 0.33
  fp16_gb: 0.17
