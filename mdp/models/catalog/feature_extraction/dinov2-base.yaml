# DINOv2 ViT-B/14 — 자기지도학습 기반 범용 비전 백본
name: dinov2-base
family: dinov2
class_path: transformers.AutoModel
head_builtin: false

pretrained_sources:
  - "hf://facebook/dinov2-base"

supported_tasks:
  - feature_extraction
  - image_classification

default_head:
  # 자기지도학습 백본이므로 다운스트림 태스크에 헤드 부착 필요
  task: image_classification
  slot: head.cls
  _component_: ClassificationHead
  hidden_dim: 768
  dropout: 0.1
  pooling: cls

input_spec:
  channels: 3
  height: 224
  width: 224
  dtype: float32

recipe_defaults:
  feature_extraction:
    model:
      _component_: transformers.AutoModel
      pretrained: "hf://facebook/dinov2-base"
    data:
      dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: train
        fields: {image: "???"}
        augmentation:
          - type: Resize
            params: {size: 256}
          - type: CenterCrop
            params: {size: 224}
          - type: ToImage
          - type: ToDtype
            params: {dtype: float32, scale: true}
          - type: Normalize
            params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 128
        num_workers: 8
    training:
      max_steps: 1
      precision: bf16
    metadata:
      author: "???"
      description: "???"
  image_classification:
    model:
      _component_: transformers.AutoModelForImageClassification
      pretrained: "hf://facebook/dinov2-base"
      num_labels: "???"
      ignore_mismatched_sizes: true
    data:
      dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: train
        fields: {image: "???", label: "???"}
        augmentation:
          - type: RandomResizedCrop
            params: {size: 224}
          - type: RandomHorizontalFlip
          - type: ToImage
          - type: ToDtype
            params: {dtype: float32, scale: true}
          - type: Normalize
            params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      val_dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: validation
        fields: {image: "???", label: "???"}
        augmentation:
          - type: Resize
            params: {size: 256}
          - type: CenterCrop
            params: {size: 224}
          - type: ToImage
          - type: ToDtype
            params: {dtype: float32, scale: true}
          - type: Normalize
            params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 64
        num_workers: 8
    training:
      epochs: 20
      precision: bf16
      gradient_accumulation_steps: 1
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 5.0e-5
      weight_decay: 0.05
    scheduler:
      _component_: CosineAnnealingLR
      T_max: 20
      warmup_ratio: 0.05
    evaluation:
      metrics: [Accuracy, F1Score]
    metadata:
      author: "???"
      description: "???"

init_args_schema:
  pretrained:
    type: bool
    default: true

adapter_defaults:
  lora:
    # HF Dinov2SelfAttention uses BERT-style separate linears (query/key/value)
    target: [attn.q, attn.v]
    r: 16
    alpha: 32

memory:
  params_m: 86.6
  fp32_gb: 0.33
  fp16_gb: 0.17
