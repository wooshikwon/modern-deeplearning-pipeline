# OpenAI CLIP ViT-B/32 — 이미지-텍스트 대조 학습 기반 멀티모달 모델
name: clip-vit-base-patch32
family: clip
class_path: transformers.CLIPModel
head_builtin: true

pretrained_sources:
  - "hf://openai/clip-vit-base-patch32"
  - "hf://openai/clip-vit-base-patch16"

supported_tasks:
  - feature_extraction

default_head:
  task: feature_extraction
  _component_: DualEncoderHead
  projection_dim: 512  # 이미지/텍스트 임베딩 공유 차원

input_spec:
  image:
    channels: 3
    height: 224
    width: 224
    dtype: float32
  text:
    max_length: 77
    dtype: long

init_args_schema:
  pretrained_model_name_or_path: {type: str, default: "openai/clip-vit-base-patch32"}
  projection_dim: {type: int, default: 512}
  attention_dropout: {type: float, default: 0.0}

adapter_defaults:
  lora:
    # vision encoder + text encoder 양쪽의 어텐션 레이어에 적용
    target_modules: ["q_proj", "v_proj"]
    r: 8
    alpha: 16

memory:
  params_m: 151.3
  fp32_gb: 0.58
  fp16_gb: 0.29
