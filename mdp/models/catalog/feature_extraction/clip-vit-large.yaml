# OpenAI CLIP ViT-L/14 — 대규모 이미지-텍스트 대조 학습 모델
name: clip-vit-large-patch14
family: clip
class_path: transformers.CLIPModel
head_builtin: true

pretrained_sources:
  - "hf://openai/clip-vit-large-patch14"
  - "hf://openai/clip-vit-large-patch14-336"

supported_tasks:
  - feature_extraction

default_head:
  task: feature_extraction
  _component_: DualEncoderHead
  hidden_dim: 768  # projection_dim

input_spec:
  image:
    channels: 3
    height: 224
    width: 224
    dtype: float32
  text:
    max_length: 77
    dtype: long

init_args_schema:
  pretrained_model_name_or_path: {type: str, default: "openai/clip-vit-large-patch14"}
  projection_dim: {type: int, default: 768}
  attention_dropout: {type: float, default: 0.0}

adapter_defaults:
  lora:
    # vision encoder + text encoder 양쪽의 어텐션 레이어에 적용
    target_modules: ["q_proj", "v_proj"]
    r: 8
    alpha: 16

memory:
  params_m: 427.6
  fp32_gb: 1.63
  fp16_gb: 0.81
