name: vit-base-patch16-224
family: vit
class_path: timm.create_model
head_builtin: false

pretrained_sources:
  - "timm://vit_base_patch16_224"
  - "hf://google/vit-base-patch16-224"

supported_tasks:
  - image_classification
  - feature_extraction

default_head:
  task: image_classification
  _component_: ClassificationHead
  hidden_dim: 768
  dropout: 0.1
  pooling: cls

input_spec:
  channels: 3
  height: 224
  width: 224
  dtype: float32

init_args_schema:
  num_classes:
    type: int
    default: 1000
  pretrained:
    type: bool
    default: true

adapter_defaults:
  lora:
    target_modules: ["qkv", "proj"]
    r: 16
    alpha: 32

memory:
  params_m: 86.6
  fp32_gb: 0.33
  fp16_gb: 0.17
