name: convnext-tiny
family: convnext
class_path: timm.create_model
head_builtin: false

pretrained_sources:
  - "timm://convnext_tiny"
  - "hf://facebook/convnext-tiny-224"

supported_tasks:
  - image_classification
  - feature_extraction

default_head:
  task: image_classification
  slot: head.cls
  _component_: ClassificationHead
  hidden_dim: 768
  dropout: 0.1

input_spec:
  channels: 3
  height: 224
  width: 224
  dtype: float32

init_args_schema:
  num_classes:
    type: int
    default: 1000
  pretrained:
    type: bool
    default: true

adapter_defaults:
  lora:
    target: [dwconv, pwconv1, pwconv2]
    r: 8
    alpha: 16

memory:
  params_m: 28.6
  fp32_gb: 0.11
  fp16_gb: 0.05
