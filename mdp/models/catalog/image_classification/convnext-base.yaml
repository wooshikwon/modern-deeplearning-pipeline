# ConvNeXt Base — 현대적 순수 합성곱 아키텍처
name: convnext-base
family: convnext
class_path: timm.create_model
head_builtin: false

pretrained_sources:
  - "timm://convnext_base.fb_in22k_ft_in1k"
  - "hf://facebook/convnext-base-224"

supported_tasks:
  - image_classification
  - feature_extraction

default_head:
  task: image_classification
  slot: head.cls
  _component_: ClassificationHead
  hidden_dim: 1024
  dropout: 0.1

input_spec:
  channels: 3
  height: 224
  width: 224
  dtype: float32

init_args_schema:
  num_classes:
    type: int
    default: 1000
  pretrained:
    type: bool
    default: true

adapter_defaults:
  lora:
    # timm ConvNeXt 블록: depthwise conv(`conv_dw`) + pointwise MLP(`fc1`, `fc2`)
    target: [conv.dw, mlp.fc1, mlp.fc2]
    r: 8
    alpha: 16

memory:
  params_m: 88.6
  fp32_gb: 0.34
  fp16_gb: 0.17
