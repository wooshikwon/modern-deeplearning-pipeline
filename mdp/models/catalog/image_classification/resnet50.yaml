name: resnet50
family: resnet
class_path: torchvision.models.resnet50
head_builtin: false

pretrained_sources:
  - "timm://resnet50"
  - "hf://microsoft/resnet-50"

supported_tasks:
  - image_classification
  - feature_extraction

default_head:
  task: image_classification
  slot: head.cls
  _component_: ClassificationHead
  hidden_dim: 2048
  dropout: 0.1

input_spec:
  channels: 3
  height: 224
  width: 224
  dtype: float32

init_args_schema:
  num_classes:
    type: int
    default: 1000
  pretrained:
    type: bool
    default: true

adapter_defaults:
  lora:
    target: [head.cls]
    r: 8
    alpha: 16

memory:
  params_m: 25.6
  fp32_gb: 0.10
  fp16_gb: 0.05
