# Swin Transformer Base — 윈도우 기반 계층적 비전 트랜스포머
name: swin-base-patch4-window7-224
family: swin_timm
class_path: timm.create_model
head_builtin: false

pretrained_sources:
  - "timm://swin_base_patch4_window7_224"
  - "hf://microsoft/swin-base-patch4-window7-224"

supported_tasks:
  - image_classification
  - feature_extraction
  - semantic_segmentation

default_head:
  task: image_classification
  slot: head.cls
  _component_: ClassificationHead
  hidden_dim: 1024
  dropout: 0.1

input_spec:
  channels: 3
  height: 224
  width: 224
  dtype: float32

recipe_defaults:
  image_classification:
    model:
      pretrained: "timm://swin_base_patch4_window7_224"
      num_classes: "???"
    data:
      dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: train
        fields: {image: "???", label: "???"}
        augmentation:
          - type: RandomResizedCrop
            params: {size: 224}
          - type: RandomHorizontalFlip
          - type: ToImage
          - type: ToDtype
            params: {dtype: float32, scale: true}
          - type: Normalize
            params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      val_dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: validation
        fields: {image: "???", label: "???"}
        augmentation:
          - type: Resize
            params: {size: 256}
          - type: CenterCrop
            params: {size: 224}
          - type: ToImage
          - type: ToDtype
            params: {dtype: float32, scale: true}
          - type: Normalize
            params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 64
        num_workers: 8
    training:
      epochs: 20
      precision: bf16
      gradient_accumulation_steps: 1
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 5.0e-5
      weight_decay: 0.05
    scheduler:
      _component_: CosineAnnealingLR
      T_max: 20
      warmup_ratio: 0.05
    evaluation:
      metrics: [Accuracy, F1Score]
    metadata:
      author: "???"
      description: "???"
  feature_extraction:
    model:
      pretrained: "timm://swin_base_patch4_window7_224"
      num_classes: 0
    data:
      dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: train
        fields: {image: "???"}
        augmentation:
          - type: Resize
            params: {size: 256}
          - type: CenterCrop
            params: {size: 224}
          - type: ToImage
          - type: ToDtype
            params: {dtype: float32, scale: true}
          - type: Normalize
            params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 128
        num_workers: 8
    training:
      max_steps: 1
      precision: bf16
    metadata:
      author: "???"
      description: "???"
  semantic_segmentation:
    model:
      pretrained: "timm://swin_base_patch4_window7_224"
    head:
      _component_: SegmentationHead
      hidden_dim: 1024
      num_classes: "???"
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {image: "???", label: "???"}
      val_dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: validation
        fields: {image: "???", label: "???"}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 8
        num_workers: 8
    training:
      epochs: 40
      precision: bf16
      gradient_accumulation_steps: 2
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 6.0e-5
      weight_decay: 0.01
    scheduler:
      _component_: CosineAnnealingLR
      T_max: 40
      warmup_ratio: 0.05
    evaluation:
      metrics: [mIoU]
    metadata:
      author: "???"
      description: "???"

init_args_schema:
  num_classes:
    type: int
    default: 1000
  pretrained:
    type: bool
    default: true

adapter_defaults:
  lora:
    target: [attn.qkv, attn.o]
    r: 16
    alpha: 32

memory:
  params_m: 87.8
  fp32_gb: 0.34
  fp16_gb: 0.17
