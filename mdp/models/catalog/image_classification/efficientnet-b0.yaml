# EfficientNet-B0 — 복합 스케일링 기반 경량 합성곱 모델
name: efficientnet-b0
family: efficientnet
class_path: timm.create_model
head_builtin: false

pretrained_sources:
  - "timm://efficientnet_b0.ra_in1k"

supported_tasks:
  - image_classification
  - feature_extraction

default_head:
  task: image_classification
  slot: head.cls
  _component_: ClassificationHead
  hidden_dim: 1280
  dropout: 0.2

input_spec:
  channels: 3
  height: 224
  width: 224
  dtype: float32

recipe_defaults:
  image_classification:
    model:
      pretrained: "timm://efficientnet_b0.ra_in1k"
      num_classes: "???"
    data:
      dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: train
        fields: {image: "???", label: "???"}
        augmentation:
          - type: RandomResizedCrop
            params: {size: 224}
          - type: RandomHorizontalFlip
          - type: ToImage
          - type: ToDtype
            params: {dtype: float32, scale: true}
          - type: Normalize
            params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      val_dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: validation
        fields: {image: "???", label: "???"}
        augmentation:
          - type: Resize
            params: {size: 256}
          - type: CenterCrop
            params: {size: 224}
          - type: ToImage
          - type: ToDtype
            params: {dtype: float32, scale: true}
          - type: Normalize
            params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 128
        num_workers: 8
    training:
      epochs: 20
      precision: bf16
      gradient_accumulation_steps: 1
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 1.0e-4
      weight_decay: 0.02
    scheduler:
      _component_: CosineAnnealingLR
      T_max: 20
      warmup_ratio: 0.05
    evaluation:
      metrics: [Accuracy, F1Score]
    metadata:
      author: "???"
      description: "???"
  feature_extraction:
    model:
      pretrained: "timm://efficientnet_b0.ra_in1k"
      num_classes: 0
    data:
      dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: train
        fields: {image: "???"}
        augmentation:
          - type: Resize
            params: {size: 256}
          - type: CenterCrop
            params: {size: 224}
          - type: ToImage
          - type: ToDtype
            params: {dtype: float32, scale: true}
          - type: Normalize
            params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 256
        num_workers: 8
    training:
      max_steps: 1
      precision: bf16
    metadata:
      author: "???"
      description: "???"

init_args_schema:
  num_classes:
    type: int
    default: 1000
  pretrained:
    type: bool
    default: true

adapter_defaults:
  # 경량 모델이라 LoRA보다 전체 파인튜닝 권장, 기본값만 제공
  # timm EfficientNet exposes the final linear as `classifier` (not `_fc`)
  lora:
    target: [head.cls]
    r: 4
    alpha: 8

memory:
  params_m: 5.3
  fp32_gb: 0.02
  fp16_gb: 0.01
