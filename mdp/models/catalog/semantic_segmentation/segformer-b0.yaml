# SegFormer-B0 — 경량 트랜스포머 기반 시맨틱 세그멘테이션
name: segformer-b0
family: segformer
class_path: transformers.AutoModelForSemanticSegmentation
head_builtin: true

pretrained_sources:
  - "hf://nvidia/segformer-b0-finetuned-ade-512-512"

supported_tasks:
  - semantic_segmentation

default_head:
  task: semantic_segmentation
  _component_: SegmentationHead
  in_channels: 256

input_spec:
  channels: 3
  height: 512
  width: 512
  dtype: float32

recipe_defaults:
  semantic_segmentation:
    model:
      _component_: transformers.AutoModelForSemanticSegmentation
      pretrained: "hf://nvidia/segformer-b0-finetuned-ade-512-512"
      num_labels: "???"
      ignore_mismatched_sizes: true
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {image: "???", label: "???"}
      val_dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: validation
        fields: {image: "???", label: "???"}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 8
        num_workers: 8
    training:
      epochs: 40
      precision: bf16
      gradient_accumulation_steps: 2
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 6.0e-5
      weight_decay: 0.01
    scheduler:
      _component_: CosineAnnealingLR
      T_max: 40
      warmup_ratio: 0.05
    evaluation:
      metrics: [mIoU]
    metadata:
      author: "???"
      description: "???"

init_args_schema:
  num_labels:
    type: int
    default: 150
  pretrained:
    type: bool
    default: true

adapter_defaults:
  lora:
    # HF SegformerEfficientSelfAttention uses BERT-style full names (query/key/value)
    target: [attn.q, attn.v]
    r: 8
    alpha: 16

memory:
  params_m: 3.7
  fp32_gb: 0.02
  fp16_gb: 0.01
