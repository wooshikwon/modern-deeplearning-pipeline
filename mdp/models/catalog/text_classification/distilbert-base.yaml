name: distilbert-base
family: distilbert
class_path: transformers.AutoModel
head_builtin: false

pretrained_sources:
  - "hf://distilbert-base-uncased"
  - "hf://distilbert/distilbert-base-uncased"

supported_tasks:
  - text_classification
  - token_classification
  - feature_extraction

default_head:
  task: text_classification
  slot: head.cls
  _component_: SequenceClassificationHead
  hidden_dim: 768

input_spec:
  max_length: 512
  vocab_size: 30522
  dtype: long

init_args_schema:
  attention_dropout: {type: float, default: 0.1}
  seq_classif_dropout: {type: float, default: 0.1}
  max_position_embeddings: {type: int, default: 512}

adapter_defaults:
  lora:
    target: [attention.q_lin, attention.v_lin]
    r: 8
    alpha: 16
    task_type: "SEQ_CLS"

memory:
  params_m: 66.4
  fp32_gb: 0.25
  fp16_gb: 0.13
