# YOLOv8 Nano — 실시간 객체 탐지 경량 모델
name: yolov8n
family: yolo
class_path: ultralytics.YOLO
head_builtin: true

pretrained_sources:
  - "ultralytics://yolov8n.pt"

supported_tasks:
  - object_detection

# YOLO는 탐지 헤드가 모델에 내장되어 있어 별도 헤드 불필요

input_spec:
  channels: 3
  height: 640
  width: 640
  dtype: float32

recipe_defaults:
  object_detection:
    model:
      pretrained: "ultralytics://yolov8n.pt"
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {image: "???", label: "???"}
      val_dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: validation
        fields: {image: "???", label: "???"}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 16
        num_workers: 8
    training:
      epochs: 100
      precision: bf16
      gradient_accumulation_steps: 1
    optimizer:
      _component_: SGD
      lr: 1.0e-2
      weight_decay: 5.0e-4
      momentum: 0.937
    evaluation:
      metrics: [mAP]
    metadata:
      author: "???"
      description: "???"

init_args_schema:
  pretrained:
    type: bool
    default: true

# YOLO는 보통 전체 파인튜닝을 사용하므로 어댑터 기본값 없음
adapter_defaults: {}

memory:
  params_m: 3.2
  fp32_gb: 0.02
  fp16_gb: 0.01
