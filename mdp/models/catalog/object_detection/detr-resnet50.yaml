# DETR (DEtection TRansformer) — 트랜스포머 기반 종단간 객체 탐지
name: detr-resnet50
family: detr
class_path: transformers.AutoModelForObjectDetection
head_builtin: true

pretrained_sources:
  - "hf://facebook/detr-resnet-50"

supported_tasks:
  - object_detection

# HuggingFace 모델에 탐지 헤드가 내장되어 있어 별도 헤드 불필요

input_spec:
  channels: 3
  height: 800
  width: 800
  dtype: float32

recipe_defaults:
  object_detection:
    model:
      _component_: transformers.AutoModelForObjectDetection
      pretrained: "hf://facebook/detr-resnet-50"
      num_labels: "???"
      ignore_mismatched_sizes: true
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {image: "???", label: "???"}
      val_dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: validation
        fields: {image: "???", label: "???"}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 4
        num_workers: 8
    training:
      epochs: 25
      precision: bf16
      gradient_accumulation_steps: 4
      gradient_clip_max_norm: 0.1
    optimizer:
      _component_: AdamW
      lr: 1.0e-5
      weight_decay: 1.0e-4
    scheduler:
      _component_: CosineAnnealingLR
      T_max: 25
      warmup_ratio: 0.05
    evaluation:
      metrics: [mAP]
    metadata:
      author: "???"
      description: "???"

init_args_schema:
  pretrained:
    type: bool
    default: true

adapter_defaults:
  lora:
    # 트랜스포머 디코더의 어텐션 레이어
    target: [attn.q, attn.v]
    r: 8
    alpha: 16

memory:
  params_m: 41.3
  fp32_gb: 0.16
  fp16_gb: 0.08
