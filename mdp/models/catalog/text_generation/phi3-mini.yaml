name: phi3-mini
family: phi3
class_path: transformers.AutoModelForCausalLM
head_builtin: true

pretrained_sources:
  - "hf://microsoft/Phi-3-mini-4k-instruct"
  - "hf://microsoft/Phi-3-mini-128k-instruct"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 3072
  vocab_size: 32064

input_spec:
  max_length: 4096
  vocab_size: 32064
  dtype: long

init_args_schema:
  max_position_embeddings: {type: int, default: 4096}
  rope_theta: {type: float, default: 10000}

recipe_defaults:
  text_generation:
    model:
      torch_dtype: bfloat16
      attn_implementation: flash_attention_2
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {text: "???"}
        tokenizer: microsoft/Phi-3-mini-4k-instruct
        max_length: 2048
        padding: false
        truncation: true
      collator:
        _component_: CausalLMCollator
        tokenizer: microsoft/Phi-3-mini-4k-instruct
        max_length: 2048
      sampler:
        _component_: LengthGroupedBatchSampler
        bucket_size: 128
      dataloader:
        batch_size: 1
        num_workers: 4
        drop_last: true
    adapter:
      _component_: LoRA
      target: [attn.qkv, attn.o]
      r: 16
      alpha: 32
      task_type: CAUSAL_LM
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 16
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 2.0e-5
      weight_decay: 0.01
    generation:
      max_new_tokens: 256
      temperature: 0.7
      top_p: 0.9
      do_sample: true
    metadata:
      author: "???"
      description: "???"

adapter_defaults:
  lora:
    target: [attn.qkv, attn.o]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"

memory:
  params_m: 3821
  fp32_gb: 15.2
  fp16_gb: 7.6
