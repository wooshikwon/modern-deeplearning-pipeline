name: qwen25-72b
family: qwen
class_path: transformers.AutoModelForCausalLM
head_builtin: true

pretrained_sources:
  - "hf://Qwen/Qwen2.5-72B"
  - "hf://Qwen/Qwen2.5-72B-Instruct"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 8192
  vocab_size: 152064

input_spec:
  max_length: 32768
  vocab_size: 152064
  dtype: long

init_args_schema:
  rope_theta: {type: float, default: 1000000}
  attention_dropout: {type: float, default: 0.0}
  max_position_embeddings: {type: int, default: 32768}
  sliding_window: {type: int, default: 32768}

adapter_defaults:
  lora:
    target: [attn.q, attn.k, attn.v, attn.o]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
  qlora:
    target: [attn.q, attn.k, attn.v, attn.o, mlp.gate, mlp.up, mlp.down]
    r: 64
    alpha: 128
    task_type: "CAUSAL_LM"
    bits: 4

memory:
  params_m: 72710
  fp32_gb: 290.8
  fp16_gb: 145.4
  qlora_4bit_gb: 42.0
