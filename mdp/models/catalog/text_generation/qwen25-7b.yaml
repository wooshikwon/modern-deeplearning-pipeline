name: qwen25-7b
family: qwen
class_path: transformers.AutoModelForCausalLM
head_builtin: true

pretrained_sources:
  - "hf://Qwen/Qwen2.5-7B"
  - "hf://Qwen/Qwen2.5-7B-Instruct"

supported_tasks:
  - text_generation
  - text_generation
  - text_classification

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 3584
  vocab_size: 152064

input_spec:
  max_length: 32768
  vocab_size: 152064
  dtype: long

init_args_schema:
  rope_theta: {type: float, default: 1000000}
  attention_dropout: {type: float, default: 0.0}
  max_position_embeddings: {type: int, default: 32768}
  sliding_window: {type: int, default: 32768}

adapter_defaults:
  lora:
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
  qlora:
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    r: 64
    alpha: 128
    task_type: "CAUSAL_LM"
    bits: 4

memory:
  params_m: 7616
  fp32_gb: 30.5
  fp16_gb: 15.2
  qlora_4bit_gb: 5.2
