name: qwen25-7b
family: qwen2
class_path: transformers.AutoModelForCausalLM
head_builtin: true

pretrained_sources:
  - "hf://Qwen/Qwen2.5-7B"
  - "hf://Qwen/Qwen2.5-7B-Instruct"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 3584
  vocab_size: 152064

input_spec:
  max_length: 32768
  vocab_size: 152064
  dtype: long

init_args_schema:
  rope_theta: {type: float, default: 1000000}
  attention_dropout: {type: float, default: 0.0}
  max_position_embeddings: {type: int, default: 32768}
  sliding_window: {type: int, default: 32768}

recipe_defaults:
  text_generation:
    model:
      torch_dtype: bfloat16
      attn_implementation: flash_attention_2
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {text: "???"}
        tokenizer: Qwen/Qwen2.5-7B
        max_length: 2048
        padding: false
        truncation: true
      collator:
        _component_: CausalLMCollator
        tokenizer: Qwen/Qwen2.5-7B
        max_length: 2048
      sampler:
        _component_: LengthGroupedBatchSampler
        bucket_size: 128
      dataloader:
        batch_size: 1
        num_workers: 4
        drop_last: true
    adapter: qlora
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 16
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 2.0e-5
      weight_decay: 0.01
    generation:
      max_new_tokens: 256
      temperature: 0.7
      top_p: 0.9
      do_sample: true
    metadata:
      author: "???"
      description: "???"

adapter_defaults:
  lora:
    target: [attn.q, attn.k, attn.v, attn.o]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
  qlora:
    target: [attn.q, attn.k, attn.v, attn.o, mlp.gate, mlp.up, mlp.down]
    r: 64
    alpha: 128
    task_type: "CAUSAL_LM"
    bits: 4

memory:
  params_m: 7616
  fp32_gb: 30.5
  fp16_gb: 15.2
  qlora_4bit_gb: 5.2
