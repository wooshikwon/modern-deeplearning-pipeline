name: mistral-7b
family: mistral
class_path: transformers.AutoModelForCausalLM
head_builtin: true

pretrained_sources:
  - "hf://mistralai/Mistral-7B-v0.3"
  - "hf://mistralai/Mistral-7B-Instruct-v0.3"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 4096
  vocab_size: 32768

input_spec:
  max_length: 32768
  vocab_size: 32768
  dtype: long

init_args_schema:
  rope_theta: {type: float, default: 1000000}
  attention_dropout: {type: float, default: 0.0}
  max_position_embeddings: {type: int, default: 32768}
  sliding_window: {type: int, default: 4096}

recipe_defaults:
  text_generation:
    model:
      torch_dtype: bfloat16
      attn_implementation: flash_attention_2
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {text: "???"}
        tokenizer: mistralai/Mistral-7B-v0.3
        max_length: 2048
        padding: false
        truncation: true
      collator:
        _component_: CausalLMCollator
        tokenizer: mistralai/Mistral-7B-v0.3
        max_length: 2048
      sampler:
        _component_: LengthGroupedBatchSampler
        bucket_size: 128
      dataloader:
        batch_size: 1
        num_workers: 4
        drop_last: true
    adapter:
      _component_: QLoRA
      target: [attn.q, attn.k, attn.v, attn.o, mlp.gate, mlp.up, mlp.down]
      r: 16
      alpha: 32
      task_type: CAUSAL_LM
      quantization:
        bits: 4
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 16
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 2.0e-5
      weight_decay: 0.01
    generation:
      max_new_tokens: 256
      temperature: 0.7
      top_p: 0.9
      do_sample: true
    metadata:
      author: "???"
      description: "???"

adapter_defaults:
  lora:
    target: [attn.q, attn.k, attn.v, attn.o]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
  qlora:
    target: [attn.q, attn.k, attn.v, attn.o, mlp.gate, mlp.up, mlp.down]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
    bits: 4

memory:
  params_m: 7248
  fp32_gb: 29.0
  fp16_gb: 14.5
