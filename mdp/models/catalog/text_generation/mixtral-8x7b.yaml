name: mixtral-8x7b
family: mixtral
class_path: transformers.AutoModelForCausalLM
head_builtin: true

pretrained_sources:
  - "hf://mistralai/Mixtral-8x7B-v0.1"
  - "hf://mistralai/Mixtral-8x7B-Instruct-v0.1"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 4096
  vocab_size: 32000

input_spec:
  max_length: 32768
  vocab_size: 32000
  dtype: long

moe:
  num_experts: 8
  top_k: 2
  decoder_layer_cls: MixtralDecoderLayer
  expert_module_pattern: "block_sparse_moe.experts"
  router_module_pattern: "block_sparse_moe.gate"

adapter_defaults:
  lora:
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
  lora_with_experts:
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "w1", "w2", "w3"]
    r: 8
    alpha: 16
    task_type: "CAUSAL_LM"

memory:
  params_m: 46700
  active_params_m: 12900
  fp16_gb: 93.4
  qlora_4bit_gb: 26.0
