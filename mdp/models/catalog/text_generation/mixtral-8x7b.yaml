name: mixtral-8x7b
family: mixtral
class_path: transformers.AutoModelForCausalLM
head_builtin: true

pretrained_sources:
  - "hf://mistralai/Mixtral-8x7B-v0.1"
  - "hf://mistralai/Mixtral-8x7B-Instruct-v0.1"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 4096
  vocab_size: 32000

input_spec:
  max_length: 32768
  vocab_size: 32000
  dtype: long

moe:
  num_experts: 8
  top_k: 2
  decoder_layer_cls: MixtralDecoderLayer
  expert_module_pattern: "block_sparse_moe.experts"
  router_module_pattern: "block_sparse_moe.gate"

recipe_defaults:
  text_generation:
    model:
      torch_dtype: bfloat16
      attn_implementation: flash_attention_2
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {text: "???"}
        tokenizer: mistralai/Mixtral-8x7B-v0.1
        max_length: 2048
        padding: false
        truncation: true
      collator:
        _component_: CausalLMCollator
        tokenizer: mistralai/Mixtral-8x7B-v0.1
        max_length: 2048
      sampler:
        _component_: LengthGroupedBatchSampler
        bucket_size: 64
      dataloader:
        batch_size: 1
        num_workers: 4
        drop_last: true
    adapter:
      _component_: LoRA
      target: [attn.q, attn.k, attn.v, attn.o]
      r: 16
      alpha: 32
      task_type: CAUSAL_LM
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 32
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 1.0e-5
      weight_decay: 0.01
    generation:
      max_new_tokens: 256
      temperature: 0.7
      top_p: 0.9
      do_sample: true
    metadata:
      author: "???"
      description: "???"

adapter_defaults:
  lora:
    # attention 4개 projection만 타겟. transformers 5.x의 MixtralExperts는
    # expert MLP를 `nn.Parameter` (fused tensor)로 저장하므로 LoRA로 래핑 불가.
    # Expert MLP 학습이 필요하면 LoRA 대신 full fine-tuning 또는 커스텀 경로.
    target: [attn.q, attn.k, attn.v, attn.o]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"

memory:
  params_m: 46700
  active_params_m: 12900
  fp16_gb: 93.4
  qlora_4bit_gb: 26.0
