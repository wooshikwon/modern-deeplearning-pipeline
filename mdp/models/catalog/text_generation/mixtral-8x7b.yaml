name: mixtral-8x7b
family: mixtral
class_path: transformers.AutoModelForCausalLM
head_builtin: true

pretrained_sources:
  - "hf://mistralai/Mixtral-8x7B-v0.1"
  - "hf://mistralai/Mixtral-8x7B-Instruct-v0.1"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 4096
  vocab_size: 32000

input_spec:
  max_length: 32768
  vocab_size: 32000
  dtype: long

moe:
  num_experts: 8
  top_k: 2
  decoder_layer_cls: MixtralDecoderLayer
  expert_module_pattern: "block_sparse_moe.experts"
  router_module_pattern: "block_sparse_moe.gate"

adapter_defaults:
  lora:
    # attention 4개 projection만 타겟. transformers 5.x의 MixtralExperts는
    # expert MLP를 `nn.Parameter` (fused tensor)로 저장하므로 LoRA로 래핑 불가.
    # Expert MLP 학습이 필요하면 LoRA 대신 full fine-tuning 또는 커스텀 경로.
    target: [attn.q, attn.k, attn.v, attn.o]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"

memory:
  params_m: 46700
  active_params_m: 12900
  fp16_gb: 93.4
  qlora_4bit_gb: 26.0
