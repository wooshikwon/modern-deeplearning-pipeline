# Microsoft Florence-2 Base — 통합 비전-언어 모델 (프롬프트 기반 멀티태스크)
# 단일 모델로 캡셔닝, 객체 탐지, 세그멘테이션, OCR 등 다양한 비전 태스크를 텍스트 프롬프트로 수행
name: florence-2-base
family: florence2
class_path: transformers.AutoModelForCausalLM
head_builtin: true

pretrained_sources:
  - "hf://microsoft/Florence-2-base"
  - "hf://microsoft/Florence-2-base-ft"

supported_tasks:
  - text_generation
  - object_detection
  - image_classification

input_spec:
  image:
    channels: 3
    height: 768
    width: 768
    dtype: float32
  text:
    max_length: 1024
    dtype: long

init_args_schema:
  pretrained_model_name_or_path: {type: str, default: "microsoft/Florence-2-base"}
  trust_remote_code: {type: bool, default: true}  # Florence-2는 커스텀 코드 필요

recipe_defaults:
  text_generation:
    model:
      torch_dtype: bfloat16
      trust_remote_code: true
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {text: "???"}
        tokenizer: microsoft/Florence-2-base
        max_length: 1024
        padding: false
        truncation: true
      collator:
        _component_: CausalLMCollator
        tokenizer: microsoft/Florence-2-base
        max_length: 1024
      sampler:
        _component_: LengthGroupedBatchSampler
        bucket_size: 64
      dataloader:
        batch_size: 1
        num_workers: 4
        drop_last: true
    adapter:
      _component_: LoRA
      target: [attn.q, attn.v, attn.k]
      r: 8
      alpha: 16
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 8
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 2.0e-5
      weight_decay: 0.01
    generation:
      max_new_tokens: 128
      temperature: 0.7
      top_p: 0.9
      do_sample: true
    metadata:
      author: "???"
      description: "???"
  object_detection:
    model:
      torch_dtype: bfloat16
      trust_remote_code: true
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {image: "???", label: "???"}
      val_dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: validation
        fields: {image: "???", label: "???"}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 2
        num_workers: 4
        drop_last: true
    adapter:
      _component_: LoRA
      target: [attn.q, attn.v, attn.k]
      r: 8
      alpha: 16
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 8
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 2.0e-5
      weight_decay: 0.01
    evaluation:
      metrics: [mAP]
    generation:
      max_new_tokens: 256
      do_sample: false
    metadata:
      author: "???"
      description: "???"
  image_classification:
    model:
      torch_dtype: bfloat16
      trust_remote_code: true
    data:
      dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: train
        fields: {image: "???", label: "???"}
      val_dataset:
        _component_: ImageClassificationDataset
        source: "???"
        split: validation
        fields: {image: "???", label: "???"}
      collator:
        _component_: VisionCollator
      dataloader:
        batch_size: 4
        num_workers: 4
        drop_last: true
    adapter:
      _component_: LoRA
      target: [attn.q, attn.v, attn.k]
      r: 8
      alpha: 16
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 4
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 2.0e-5
      weight_decay: 0.01
    evaluation:
      metrics: [Accuracy, F1Score]
    generation:
      max_new_tokens: 128
      do_sample: false
    metadata:
      author: "???"
      description: "???"

adapter_defaults:
  lora:
    # 인코더-디코더 양쪽의 어텐션 레이어에 적용
    target: [attn.q, attn.v, attn.k]
    r: 8
    alpha: 16

memory:
  params_m: 232
  fp32_gb: 0.88
  fp16_gb: 0.44
