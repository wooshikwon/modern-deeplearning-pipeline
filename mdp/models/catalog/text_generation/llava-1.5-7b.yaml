# LLaVA 1.5 7B — 비전 인코더(CLIP) + LLM(Vicuna) 결합 멀티모달 생성 모델
# 이미지를 이해하고 자연어로 응답하는 시각적 질의응답 및 텍스트 생성 지원
name: llava-1.5-7b
family: llava
class_path: transformers.LlavaForConditionalGeneration
head_builtin: true

pretrained_sources:
  - "hf://llava-hf/llava-1.5-7b-hf"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 4096
  vocab_size: 32000

input_spec:
  image:
    channels: 3
    height: 336
    width: 336
    dtype: float32
  text:
    max_length: 2048
    dtype: long

init_args_schema:
  pretrained_model_name_or_path: {type: str, default: "llava-hf/llava-1.5-7b-hf"}
  image_token_index: {type: int, default: 32000}
  vision_feature_select_strategy: {type: str, default: "default", choices: ["default", "full"]}

adapter_defaults:
  lora:
    # LLM 부분의 어텐션 레이어에 적용
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
  qlora:
    # LLM 부분의 어텐션 + FFN 레이어에 적용 (메모리 절감)
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
    bits: 4

memory:
  params_m: 7063
  fp32_gb: 28.2
  fp16_gb: 14.1
  qlora_4bit_gb: 5.0
