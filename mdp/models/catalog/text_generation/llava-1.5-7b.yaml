# LLaVA 1.5 7B — 비전 인코더(CLIP) + LLM(Vicuna) 결합 멀티모달 생성 모델
# 이미지를 이해하고 자연어로 응답하는 시각적 질의응답 및 텍스트 생성 지원
name: llava-1.5-7b
family: llava
class_path: transformers.LlavaForConditionalGeneration
head_builtin: true

pretrained_sources:
  - "hf://llava-hf/llava-1.5-7b-hf"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 4096
  vocab_size: 32000

input_spec:
  image:
    channels: 3
    height: 336
    width: 336
    dtype: float32
  text:
    max_length: 2048
    dtype: long

init_args_schema:
  pretrained_model_name_or_path: {type: str, default: "llava-hf/llava-1.5-7b-hf"}
  image_token_index: {type: int, default: 32000}
  vision_feature_select_strategy: {type: str, default: "default", choices: ["default", "full"]}

recipe_defaults:
  text_generation:
    model:
      torch_dtype: bfloat16
      attn_implementation: flash_attention_2
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {text: "???"}
        tokenizer: llava-hf/llava-1.5-7b-hf
        max_length: 2048
        padding: false
        truncation: true
      collator:
        _component_: CausalLMCollator
        tokenizer: llava-hf/llava-1.5-7b-hf
        max_length: 2048
      sampler:
        _component_: LengthGroupedBatchSampler
        bucket_size: 64
      dataloader:
        batch_size: 1
        num_workers: 4
        drop_last: true
    adapter: qlora
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 16
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 2.0e-5
      weight_decay: 0.01
    generation:
      max_new_tokens: 256
      temperature: 0.7
      top_p: 0.9
      do_sample: true
    metadata:
      author: "???"
      description: "???"

adapter_defaults:
  lora:
    # LLM 부분의 어텐션 레이어에 적용 (내부 LLM은 Llama-style)
    target: [attn.q, attn.k, attn.v, attn.o]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
  qlora:
    # LLM 부분의 어텐션 + FFN 레이어에 적용 (메모리 절감)
    target: [attn.q, attn.k, attn.v, attn.o, mlp.gate, mlp.up, mlp.down]
    r: 16
    alpha: 32
    task_type: "CAUSAL_LM"
    bits: 4

memory:
  params_m: 7063
  fp32_gb: 28.2
  fp16_gb: 14.1
  qlora_4bit_gb: 5.0
