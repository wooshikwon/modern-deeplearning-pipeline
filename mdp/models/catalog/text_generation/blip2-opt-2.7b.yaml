# BLIP-2 OPT-2.7B — Q-Former 브릿지로 비전 인코더와 LLM을 연결하는 멀티모달 모델
# 이미지 이해, 캡셔닝, 시각적 질의응답 등 다양한 비전-언어 태스크 지원
name: blip2-opt-2.7b
family: blip-2
class_path: transformers.Blip2ForConditionalGeneration
head_builtin: true

pretrained_sources:
  - "hf://Salesforce/blip2-opt-2.7b"

supported_tasks:
  - text_generation

default_head:
  task: text_generation
  _component_: CausalLMHead
  hidden_dim: 2560  # OPT-2.7B의 히든 차원
  vocab_size: 50272

input_spec:
  image:
    channels: 3
    height: 224
    width: 224
    dtype: float32
  text:
    max_length: 512
    dtype: long

init_args_schema:
  pretrained_model_name_or_path: {type: str, default: "Salesforce/blip2-opt-2.7b"}
  num_query_tokens: {type: int, default: 32}

recipe_defaults:
  text_generation:
    model:
      torch_dtype: bfloat16
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {text: "???"}
        tokenizer: Salesforce/blip2-opt-2.7b
        max_length: 512
        padding: false
        truncation: true
      collator:
        _component_: CausalLMCollator
        tokenizer: Salesforce/blip2-opt-2.7b
        max_length: 512
      sampler:
        _component_: LengthGroupedBatchSampler
        bucket_size: 64
      dataloader:
        batch_size: 1
        num_workers: 4
        drop_last: true
    adapter:
      _component_: LoRA
      target: [attn.q, attn.v]
      r: 8
      alpha: 16
      task_type: CAUSAL_LM
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 16
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 2.0e-5
      weight_decay: 0.01
    generation:
      max_new_tokens: 128
      temperature: 0.7
      top_p: 0.9
      do_sample: true
    metadata:
      author: "???"
      description: "???"

adapter_defaults:
  lora:
    # OPT LLM 부분의 어텐션 레이어에 적용
    target: [attn.q, attn.v]
    r: 8
    alpha: 16
    task_type: "CAUSAL_LM"

memory:
  params_m: 3770
  fp32_gb: 15.0
  fp16_gb: 7.5
