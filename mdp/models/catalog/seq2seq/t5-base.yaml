name: t5-base
family: t5
class_path: transformers.AutoModelForSeq2SeqLM
head_builtin: true

pretrained_sources:
  - "hf://t5-base"
  - "hf://google-t5/t5-base"

supported_tasks:
  - seq2seq
  - text_classification

default_head:
  task: seq2seq
  _component_: Seq2SeqLMHead
  hidden_dim: 768
  vocab_size: 32128

input_spec:
  max_length: 512
  vocab_size: 32128
  dtype: long

init_args_schema:
  dropout_rate: {type: float, default: 0.1}
  d_model: {type: int, default: 768}
  num_heads: {type: int, default: 12}

recipe_defaults:
  seq2seq:
    model:
      torch_dtype: bfloat16
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {text: "???", target: "???"}
        tokenizer: t5-base
        max_length: 512
        padding: false
        truncation: true
      collator:
        _component_: Seq2SeqCollator
        tokenizer: t5-base
        max_length: 512
      sampler:
        _component_: LengthGroupedBatchSampler
        bucket_size: 256
      dataloader:
        batch_size: 8
        num_workers: 4
        drop_last: true
    adapter:
      _component_: LoRA
      target: [attn.q, attn.v]
      r: 8
      alpha: 16
      task_type: SEQ_2_SEQ_LM
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 4
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 3.0e-5
      weight_decay: 0.01
    generation:
      max_new_tokens: 128
      num_beams: 4
      do_sample: false
    metadata:
      author: "???"
      description: "???"
  text_classification:
    model:
      torch_dtype: bfloat16
    data:
      dataset:
        _component_: HuggingFaceDataset
        source: "???"
        split: train
        fields: {text: "???", label: "???"}
        tokenizer: t5-base
        max_length: 512
        padding: false
        truncation: true
      collator:
        _component_: ClassificationCollator
        tokenizer: t5-base
      sampler:
        _component_: LengthGroupedBatchSampler
        bucket_size: 256
      dataloader:
        batch_size: 8
        num_workers: 4
        drop_last: true
    head:
      _component_: SequenceClassificationHead
      hidden_dim: 768
      num_classes: "???"
    adapter:
      _component_: LoRA
      target: [attn.q, attn.v]
      r: 8
      alpha: 16
      task_type: SEQ_2_SEQ_LM
    training:
      epochs: 3
      precision: bf16
      gradient_accumulation_steps: 4
      gradient_checkpointing: true
      gradient_clip_max_norm: 1.0
    optimizer:
      _component_: AdamW
      lr: 3.0e-5
      weight_decay: 0.01
    evaluation:
      metrics: [Accuracy, F1Score]
    metadata:
      author: "???"
      description: "???"

adapter_defaults:
  lora:
    target: [attn.q, attn.v]
    r: 8
    alpha: 16
    task_type: "SEQ_2_SEQ_LM"

memory:
  params_m: 222.9
  fp32_gb: 0.85
  fp16_gb: 0.42
