name: tiny-vision-e2e
task: image_classification

model:
  _component_: tests.e2e.models.TinyVisionModel
  num_classes: 2
  hidden_dim: 16

data:
  dataset:
    _component_: ImageClassificationDataset
    source: /tmp/fake
    fields:
      image: pixel_values
      label: labels
  collator:
    _component_: VisionCollator
  dataloader:
    batch_size: 4
    num_workers: 0

training:
  epochs: 2
  precision: fp32
  early_stopping:
    monitor: val_loss
    patience: 10

optimizer:
  _component_: AdamW
  lr: 0.001

metadata:
  author: test
  description: "Tiny vision model for pipeline E2E test"
