name: clip-custom-finetune
task: feature_extraction

model:
  _component_: mdp.models.multimodal.CLIPModel
  pretrained: hf://openai/clip-vit-base-patch32
  projection_dim: 512

head:
  _component_: DualEncoderHead
  _target_attr: head

data:
  dataset:
    _component_: HuggingFaceDataset
    source: "gs://my-bucket/clip-data/{00000..00099}.tar"
    split: train
    streaming: true
    fields:
      image: image
      text: text
    tokenizer: openai/clip-vit-base-patch32
    max_length: 77
  val_dataset:
    _component_: HuggingFaceDataset
    source: "gs://my-bucket/clip-data/{00000..00099}.tar"
    split: val
    streaming: true
    fields:
      image: image
      text: text
    tokenizer: openai/clip-vit-base-patch32
    max_length: 77
  collator:
    _component_: VisionCollator
  dataloader:
    batch_size: 256
    num_workers: 8
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4
    drop_last: true

training:
  epochs: 10
  precision: bf16
  gradient_accumulation_steps: 1
  gradient_clip_max_norm: 1.0
  gradient_checkpointing: false
  val_check_interval: 1000
  val_check_unit: step

optimizer:
  _component_: AdamW
  lr: 5e-6
  weight_decay: 0.2
  betas: [0.9, 0.98]
  eps: 1e-6

scheduler:
  _component_: CosineAnnealingLR
  T_max: 10
  eta_min: 0
  warmup_steps: 2000

evaluation:
  metrics:
    - retrieval_accuracy
    - clip_score

metadata:
  author: wesley
  description: "CLIP ViT-B/32 fine-tuning on custom image-text pairs. GCP A100x8, bf16."
