name: qwen25-7b-qlora-instruct
task: text_generation

model:
  _component_: mdp.models.language.CausalLM
  pretrained: hf://Qwen/Qwen2.5-7B
  torch_dtype: bfloat16

adapter:
  _component_: QLoRA
  r: 64
  alpha: 128
  dropout: 0.1
  target: "all-linear"
  quantization:
    bits: 4
    type: nf4
  save:
    - head.lm
    - embed.token

data:
  dataset:
    _component_: HuggingFaceDataset
    source: HuggingFaceH4/ultrachat_200k
    split: train_sft
    format: auto
    fields:
      text: text
    tokenizer: Qwen/Qwen2.5-7B
    max_length: 2048
  val_dataset:
    _component_: HuggingFaceDataset
    source: HuggingFaceH4/ultrachat_200k
    split: test_sft
    format: auto
    fields:
      text: text
    tokenizer: Qwen/Qwen2.5-7B
    max_length: 2048
  collator:
    _component_: CausalLMCollator
    tokenizer: Qwen/Qwen2.5-7B
    max_length: 2048
  dataloader:
    batch_size: 2
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
    drop_last: true

training:
  epochs: 3
  precision: bf16
  gradient_accumulation_steps: 8
  gradient_clip_max_norm: 1.0
  gradient_checkpointing: true
  val_check_interval: 200
  val_check_unit: step

optimizer:
  _component_: bitsandbytes.optim.AdamW8bit
  lr: 2e-4
  weight_decay: 0.01

scheduler:
  _component_: CosineAnnealingLR
  T_max: 3
  eta_min: 0
  warmup_ratio: 0.03

evaluation:
  metrics:
    - perplexity

metadata:
  author: wesley
  description: "Qwen-2.5 7B QLoRA SFT on UltraChat 200K. Multi-GPU DDP, 4-bit NF4."
