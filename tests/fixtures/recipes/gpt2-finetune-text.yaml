name: gpt2-custom-finetune
task: text_generation

model:
  class_path: mdp.models.language.CausalLM
  pretrained: hf://gpt2

head:
  _component_: mdp.heads.CausalLMHead

data:
  dataset:
    _component_: mdp.data.HuggingFace
    name: wikitext
    subset: wikitext-103-v1
    columns:
      text: "text"
    split:
      train: "train"
      val: "validation"
      test: "test"
  tokenizer:
    pretrained: gpt2
    max_length: 1024
    padding: max_length
    truncation: true
  dataloader:
    batch_size: 8
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
    drop_last: true

training:
  epochs: 5
  precision: bf16
  gradient_accumulation_steps: 2
  gradient_clip_max_norm: 1.0
  gradient_checkpointing: true
  val_check_interval: 500

optimizer:
  _component_: torch.optim.AdamW
  lr: 5e-5
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  _component_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 5
  eta_min: 1e-6
  warmup_ratio: 0.05

evaluation:
  metrics:
    - perplexity
    - bleu

callbacks:
  - _component_: mdp.callbacks.ModelCheckpoint
    monitor: val_perplexity
    save_top_k: 2
    mode: min
  - _component_: mdp.callbacks.ThroughputMonitor

metadata:
  author: wesley
  description: "GPT-2 base full fine-tuning on WikiText-103. 4GPU DDP, bf16."
