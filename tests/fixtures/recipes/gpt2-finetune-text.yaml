name: gpt2-custom-finetune
task: text_generation

model:
  _component_: AutoModelForCausalLM
  pretrained: hf://gpt2

data:
  dataset:
    _component_: HuggingFaceDataset
    source: wikitext
    subset: wikitext-103-v1
    split: train
    fields: {text: text}
    tokenizer: gpt2
    max_length: 1024
  val_dataset:
    _component_: HuggingFaceDataset
    source: wikitext
    subset: wikitext-103-v1
    split: validation
    fields: {text: text}
    tokenizer: gpt2
    max_length: 1024
  collator:
    _component_: CausalLMCollator
    tokenizer: gpt2
  dataloader:
    batch_size: 8
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
    drop_last: true

training:
  epochs: 5
  precision: bf16
  gradient_accumulation_steps: 2
  gradient_clip_max_norm: 1.0
  gradient_checkpointing: true
  val_check_interval: 500
  val_check_unit: step

optimizer:
  _component_: AdamW
  lr: 5e-5
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  _component_: CosineAnnealingLR
  T_max: 5
  eta_min: 1e-6
  warmup_ratio: 0.05

evaluation:
  metrics:
    - perplexity
    - bleu

callbacks:
  - _component_: ModelCheckpoint
    monitor: val_perplexity
    save_top_k: 2
    mode: min

metadata:
  author: wesley
  description: "GPT-2 base full fine-tuning on WikiText-103. 4GPU DDP, bf16."
